name: hbai
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10.14
  - pip=24.2
  - numpy=1.26.4
  - pandas=2.2.2
  - pillow=10.4.0
  - matplotlib=3.9.2
  - opencv=4.10.0
  - scikit-image=0.24.0
  - scipy=1.13.1
  - pytorch=2.4.1
  - torchvision=0.19.1
  - pytorch-cuda=12.1
  - pip:
      - -r requirements-lock.txt
      - -e .
